<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Forensic Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base: '#0A0A0A',
                        surface: '#15151A',
                        border: '#1C1C22',
                        textMain: '#F4F4F0',
                        textMuted: '#8E8E93',
                        lime: '#D4FF3F',
                        coral: '#FF5A5F',
                        amber: '#FFB020'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0A0A0A; color: #F4F4F0; overflow: hidden; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1C1C22; }
        .cursor-blink::after {
            content: '█';
            display: inline-block;
            margin-left: 4px;
            animation: blink 1s step-end infinite;
            color: #D4FF3F;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .border-hard { border-width: 1px; border-style: solid; border-color: #1C1C22; }
    </style>
</head>
<body class="font-sans antialiased h-screen flex flex-col selection:bg-lime selection:text-base">

    <div id="authOverlay" class="fixed inset-0 z-50 bg-base flex flex-col items-center justify-center">
        <div class="w-full max-w-md bg-surface border-hard p-8 rounded-sm shadow-2xl">
            <div class="flex items-center gap-3 mb-8 pb-4 border-b border-border">
                <div class="w-4 h-4 bg-lime"></div>
                <h1 class="text-sm font-mono tracking-widest uppercase text-textMain">AVA // System Governance</h1>
            </div>
            <div class="space-y-4 font-mono text-xs">
                <div>
                    <label class="block text-textMuted uppercase mb-2 tracking-widest">Operator ID</label>
                    <input type="text" value="admin@venture-studio.io" class="w-full bg-base border-hard p-3 text-textMain outline-none" readonly>
                </div>
                <div>
                    <label class="block text-textMuted uppercase mb-2 tracking-widest">Auth Key</label>
                    <input type="password" value="••••••••••••" class="w-full bg-base border-hard p-3 text-textMain outline-none" readonly>
                </div>
            </div>
            <button onclick="unlockSystem()" class="mt-8 w-full bg-base border border-lime text-lime font-mono uppercase tracking-widest text-xs py-4 hover:bg-lime hover:text-base transition-all rounded-sm">
                Initialize War-Room
            </button>
        </div>
    </div>

    <div id="appInterface" class="hidden flex h-screen w-full relative">
        <aside class="w-56 bg-base border-r border-border flex flex-col justify-between">
            <div>
                <div class="p-6 border-b border-border flex items-center gap-3">
                    <div class="w-3 h-3 bg-lime"></div>
                    <span class="font-mono text-xs uppercase tracking-widest font-bold">AVA . 01</span>
                </div>
                <nav class="flex flex-col mt-4 font-mono text-[10px] uppercase tracking-widest">
                    <div class="px-6 py-4 flex items-center gap-4 text-lime bg-surface border-l-2 border-lime">Audits</div>
                    <div class="px-6 py-4 flex items-center gap-4 text-textMuted opacity-50 cursor-not-allowed">Ledger</div>
                    <div class="px-6 py-4 flex items-center gap-4 text-textMuted opacity-50 cursor-not-allowed">Agents</div>
                </nav>
            </div>
            <div class="p-6 border-t border-border">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-1.5 h-1.5 bg-lime rounded-full"></div>
                    <span class="font-mono text-[9px] uppercase tracking-widest text-textMuted">System Active</span>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-base overflow-hidden">
            <header class="h-16 border-b border-border flex items-center justify-between px-8 bg-surface">
                <h2 class="font-mono text-xs uppercase tracking-widest text-textMuted">Forensic Command Center</h2>
            </header>

            <div class="flex-1 overflow-y-auto p-8 custom-scrollbar">
                <div class="max-w-5xl mx-auto space-y-8">
                    
                    <div class="bg-surface border-hard rounded-sm p-6">
                        <span class="font-mono text-[10px] uppercase tracking-widest text-textMuted block mb-4">Strategic Input</span>
                        <textarea id="hypothesisInput" class="w-full h-24 bg-base border-hard p-4 text-sm font-mono text-textMain focus:outline-none focus:border-textMuted transition-colors resize-none mb-6" placeholder="Enter venture hypothesis..."></textarea>
                        <div class="flex justify-between items-center">
                            <span id="statusIndicator" class="font-mono text-[10px] uppercase tracking-widest text-textMuted">Idle</span>
                            <button onclick="executeAudit()" id="executeBtn" class="bg-base border border-lime text-lime px-8 py-3 font-mono text-[10px] uppercase tracking-widest hover:bg-lime hover:text-base transition-colors rounded-sm">
                                Execute Protocol
                            </button>
                        </div>
                    </div>

                    <div id="verdictOutput" class="hidden space-y-6">
                        <div class="flex items-end justify-between border-b border-border pb-6">
                            <div>
                                <h3 class="font-mono text-sm uppercase tracking-widest text-textMain mb-2">Verifying Forensic Logic</h3>
                                <p class="text-xs text-textMuted font-mono">Multi-agent synthesis sequence active.</p>
                            </div>
                            <div class="text-right">
                                <p class="font-mono text-[10px] uppercase tracking-widest text-textMuted mb-1">Resilience</p>
                                <div class="font-mono text-5xl text-lime leading-none" id="scoreDisplay">--</div>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 gap-4">
                            <div class="bg-surface border-hard border-l-2 border-l-coral p-6">
                                <span class="font-mono text-[10px] uppercase text-coral font-bold block mb-4">Agent 01 // The Saboteur</span>
                                <div class="font-mono text-xs text-textMuted min-h-[40px] leading-relaxed" id="textSaboteur"></div>
                            </div>
                            <div class="bg-surface border-hard border-l-2 border-l-amber p-6">
                                <span class="font-mono text-[10px] uppercase text-amber font-bold block mb-4">Agent 02 // The Predator</span>
                                <div class="font-mono text-xs text-textMuted min-h-[40px] leading-relaxed" id="textPredator"></div>
                            </div>
                            <div class="bg-surface border-hard border-l-2 border-l-lime p-6">
                                <span class="font-mono text-[10px] uppercase text-lime font-bold block mb-4">Agent 03 // Synthesis</span>
                                <div class="font-mono text-xs text-textMuted min-h-[40px] leading-relaxed" id="textOrchestrator"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        function unlockSystem() {
            document.getElementById('authOverlay').style.display = 'none';
            document.getElementById('appInterface').classList.remove('hidden');
        }

        async function typeWriter(elementId, text) {
            const el = document.getElementById(elementId);
            el.innerHTML = '';
            el.classList.add('cursor-blink');
            for (let i = 0; i < text.length; i++) {
                el.innerHTML += text.charAt(i);
                await new Promise(r => setTimeout(r, 10));
            }
            el.classList.remove('cursor-blink');
        }

        async function executeAudit() {
            const input = document.getElementById('hypothesisInput').value.toLowerCase();
            if(!input) return;

            const btn = document.getElementById('executeBtn');
            const output = document.getElementById('verdictOutput');
            
            btn.innerText = "COMPUTING...";
            btn.style.pointerEvents = 'none';
            output.classList.remove('hidden');

            let s1, s2, s3, score;

            // DYNAMIC LOGIC CONTROLLER
            if (input.length < 10) {
                s1 = "[!] Input too sparse for forensic scan. Analysis accuracy reduced.";
                s2 = "[!] No identifiable market predators for low-signal hypothesis.";
                s3 = "Directive: Provide detailed venture architecture to enable Adversarial SWOT.";
                score = 12;
            } else if (input.includes("ai") || input.includes("saas")) {
                s1 = "FORENSIC ALERT: Over-processing waste. Architecture relies on non-proprietary LLM wrappers with no defensible infrastructure.";
                s2 = "PREDATOR THREAT: Hyperscalers (Google/OpenAI) can replicate core functionality as a native feature, zeroing your CAC advantage.";
                s3 = "Pivot to verticalized data acquisition. Secure proprietary datasets before scaling software frontend.";
                score = 38;
            } else if (input.includes("delivery") || input.includes("logistics")) {
                s1 = "WASTE DETECTED: Transport and Motion. Micro-fulfillment model shows a 24% capital drag in last-mile unit economics.";
                s2 = "MOAT BREACH: Incumbent players with existing delivery density can price-war your localized hubs out of the market.";
                s3 = "Recommendation: Shift from asset-heavy ownership to a software-only routing API for existing 3PL partners.";
                score = 54;
            } else {
                s1 = "INTERNAL THREAT: Execution maturity mismatch. Proposed roadmap lacks technical defensibility against fast-followers.";
                s2 = "EXTERNAL RISK: Market incumbents currently hold the distribution moat. Your entry strategy relies on unsustainable subsidies.";
                s3 = "Verdict: Tighten the focus to a specific niche where incumbents have 'Waiting Waste' inefficiencies.";
                score = 47;
            }

            await typeWriter('textSaboteur', s1);
            await new Promise(r => setTimeout(r, 400));
            await typeWriter('textPredator', s2);
            await new Promise(r => setTimeout(r, 400));
            await typeWriter('textOrchestrator', s3);
            
            document.getElementById('scoreDisplay').innerText = score;
            btn.innerText = "EXECUTE PROTOCOL";
            btn.style.pointerEvents = 'auto';
        }
    </script>
</body>
</html>
