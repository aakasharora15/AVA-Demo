<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Strategic Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --lime: #D4FF3F; --coral: #FF5A5F; --amber: #FFB020; --base: #0A0A0A; --surface: #15151A; --border: #1C1C22; }
        body { background-color: var(--base); color: #F4F4F0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .border-hard { border: 1px solid var(--border); }
        .cursor-blink::after { content: '█'; animation: blink 1s step-end infinite; color: var(--lime); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body class="antialiased selection:bg-lime selection:text-black">

    <div id="authLayer" class="fixed inset-0 z-50 bg-base flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-surface border-hard p-10 rounded-sm shadow-2xl">
            <div class="flex items-center gap-3 mb-10 pb-4 border-b border-border">
                <div class="w-4 h-4 bg-lime"></div>
                <h1 class="text-xs font-mono uppercase tracking-[0.3em] text-white">AVA // IDENTITY_MOAT</h1>
            </div>
            <div class="space-y-6">
                <input type="email" id="email" placeholder="PROFESSIONAL EMAIL" class="w-full bg-base border-hard p-4 font-mono text-xs text-white outline-none focus:border-lime">
                <input type="password" id="password" placeholder="SECURE PASSWORD" class="w-full bg-base border-hard p-4 font-mono text-xs text-white outline-none focus:border-lime">
                <button onclick="handleAuth()" class="w-full bg-lime text-black font-mono font-bold py-4 text-xs uppercase tracking-widest hover:bg-white transition-all">Verify Identity</button>
                <p id="authMsg" class="text-[10px] font-mono text-zinc-500 uppercase text-center"></p>
            </div>
        </div>
    </div>

    <div id="mainInterface" class="hidden h-screen w-full flex">
        
        <aside class="w-64 border-r border-border bg-base flex flex-col p-6">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-4 h-4 bg-lime"></div>
                <span class="font-mono font-bold text-sm tracking-tighter">AVA <span class="opacity-30">V1.1</span></span>
            </div>
            <div class="flex-1 overflow-y-auto">
                <p class="text-[9px] font-mono text-zinc-600 uppercase tracking-widest mb-4">Strategic Ledger</p>
                <div id="ledgerList" class="space-y-2"></div>
            </div>
            <button onclick="logout()" class="text-[9px] font-mono text-zinc-600 uppercase hover:text-coral transition-colors mt-8">Deauthorize</button>
        </aside>

        <main class="flex-1 flex flex-col bg-base relative overflow-hidden">
            <header class="h-16 border-b border-border flex items-center justify-between px-8 bg-surface">
                <span class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Workspace // Adversarial War-Room</span>
                <span id="sessionEmail" class="text-[10px] font-mono text-lime uppercase"></span>
            </header>

            <div class="flex-1 overflow-y-auto p-12 custom-scrollbar">
                <div class="max-w-4xl mx-auto space-y-12">
                    
                    <div class="bg-surface border-hard p-8 rounded-sm">
                        <span class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest mb-4 block">Venture Hypothesis Input</span>
                        <textarea id="hypInput" class="w-full bg-base border-hard p-6 font-mono text-sm text-white focus:outline-none focus:border-zinc-500 h-32 resize-none mb-6" placeholder="Enter strategy architecture..."></textarea>
                        <div class="flex justify-between items-center">
                            <span id="status" class="text-[10px] font-mono text-zinc-600 uppercase">System Ready</span>
                            <button onclick="runAudit()" id="execBtn" class="bg-white text-black px-10 py-3 font-mono font-bold text-[10px] uppercase tracking-widest hover:bg-lime transition-all">Execute Protocol</button>
                        </div>
                    </div>

                    <div id="output" class="hidden space-y-8 animate-in fade-in duration-700">
                        <div class="flex justify-between items-end border-b border-border pb-8">
                            <div>
                                <h2 class="font-mono text-xl font-bold italic tracking-tighter uppercase mb-2">Forensic Verdict</h2>
                                <p class="text-[10px] font-mono text-zinc-500 uppercase">Ensemble Synthesis Complete</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] font-mono text-zinc-500 uppercase mb-1">Resilience Score</p>
                                <p id="score" class="text-6xl font-mono font-bold text-lime">--</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="bg-surface border-hard border-l-2 border-l-coral p-8">
                                <span class="text-[10px] font-mono text-coral font-bold uppercase block mb-4">Agent 01 // The Saboteur (TIM WOODS)</span>
                                <div id="saboteurText" class="text-sm font-mono text-zinc-400 leading-relaxed min-h-[40px]"></div>
                            </div>
                            <div class="bg-surface border-hard border-l-2 border-l-amber p-8">
                                <span class="text-[10px] font-mono text-amber font-bold uppercase block mb-4">Agent 02 // The Predator (SWOT-A)</span>
                                <div id="predatorText" class="text-sm font-mono text-zinc-400 leading-relaxed min-h-[40px]"></div>
                            </div>
                            <div class="bg-surface border-hard border-l-2 border-l-lime p-8">
                                <span class="text-[10px] font-mono text-lime font-bold uppercase block mb-4">Agent 03 // Synthesis Orchestrator</span>
                                <div id="synthText" class="text-sm font-mono text-zinc-400 leading-relaxed min-h-[40px]"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Supabase Init
        const SB_URL = 'https://hlirdhxbseuhudurjrkl.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsaXJkaHhic2V1aHVkdXJqcmtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MTY0NzAsImV4cCI6MjA5NDE5MjQ3MH0.DIB8aKuBFQzEzHNTZw8lPmxUUygAsTQ0ac9vof2iU8E';
        const sb = supabase.createClient(SB_URL, SB_KEY);

        // UI Controllers
        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (error) document.getElementById('authMsg').innerText = error.message;
            else location.reload();
        }

        async function logout() { await sb.auth.signOut(); location.reload(); }

        async function type(id, text) {
            const el = document.getElementById(id);
            el.innerHTML = ''; el.classList.add('cursor-blink');
            for (let char of text) { el.innerHTML += char; await new Promise(r => setTimeout(r, 10)); }
            el.classList.remove('cursor-blink');
        }

        async function runAudit() {
            const idea = document.getElementById('hypInput').value;
            if(!idea) return;
            const btn = document.getElementById('execBtn');
            const status = document.getElementById('status');
            btn.innerText = 'EXECUTING...'; btn.style.pointerEvents = 'none';
            status.innerText = 'Orchestrating Ensemble...'; status.style.color = '#D4FF3F';
            document.getElementById('output').classList.remove('hidden');

            // Dynamic Forensic Logic
            let s1, s2, s3, score;
            const low = idea.toLowerCase();
            if (low.includes("hello")) {
                score = 12;
                s1 = "[!] STRUCTURAL DEFECT: Input lacks strategic weight. Audit aborted at pre-flight.";
                s2 = "[!] PREDATOR IGNORED: No identifiable market vulnerability detected in low-signal input.";
                s3 = "DIRECTIVE: Input must contain venture architecture (e.g., pricing, logistics, or moat).";
            } else if (low.includes("ai") || low.includes("saas")) {
                score = 38;
                s1 = "FORENSIC ALERT: Over-processing waste. Reliance on non-proprietary LLM wrappers.";
                s2 = "ATTACK VECTOR: Amazon/Google will weaponize your core feature as a native OS integration.";
                s3 = "PIVOT: Decentralize data acquisition. Build a proprietary RAG layer on private datasets.";
            } else {
                score = 47;
                s1 = "INTERNAL THREAT: Execution maturity mismatch. Roadmap lacks technical defensibility.";
                s2 = "EXTERNAL RISK: Incumbents hold the distribution moat. Entry strategy relies on subsidies.";
                s3 = "VERDICT: Narrow niche focus where incumbents face high 'Waiting Waste' inefficiencies.";
            }

            await type('saboteurText', s1); await new Promise(r => setTimeout(r, 400));
            await type('predatorText', s2); await new Promise(r => setTimeout(r, 400));
            await type('synthText', s3);
            document.getElementById('score').innerText = score;
            btn.innerText = 'EXECUTE PROTOCOL'; btn.style.pointerEvents = 'auto';
            status.innerText = 'System Idle'; status.style.color = '#52525b';
        }

        // Session Check
        sb.auth.getUser().then(({data:{user}}) => {
            if(user) {
                document.getElementById('authLayer').classList.add('hidden');
                document.getElementById('mainInterface').classList.remove('hidden');
                document.getElementById('sessionEmail').innerText = user.email;
            }
        });
    </script>
</body>
</html>
