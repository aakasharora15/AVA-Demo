<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA | Strategic Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; }
        .executive-shadow { box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">
    <div class="max-w-2xl w-full">
        <header class="mb-12">
            <h1 class="text-2xl font-semibold tracking-tight text-gray-900">🛡️ AVA Orchestrator</h1>
            <p class="text-gray-500 font-light mt-2">Adversarial Venture Architect | Governance & Stress-Testing</p>
        </header>

        <div class="bg-white p-8 rounded-2xl border border-gray-100 executive-shadow">
            <textarea id="ideaInput" rows="4" class="w-full p-4 text-lg font-light bg-transparent border-none focus:ring-0 placeholder-gray-300 resize-none" placeholder="Drop your business strategy here..."></textarea>
            <div class="flex justify-end mt-4">
                <button onclick="runSimulation()" id="runBtn" class="bg-black text-white px-8 py-3 rounded-full text-sm font-medium hover:bg-zinc-800 transition-all">Execute War-Game</button>
            </div>
        </div>

        <div id="resultsArea" class="mt-8 hidden animate-fade-in">
            <div class="p-6 bg-zinc-50 rounded-xl border border-zinc-100">
                <h3 class="text-xs uppercase tracking-widest text-zinc-400 font-semibold mb-4">Strategic Audit Result</h3>
                <div id="output" class="text-gray-700 leading-relaxed whitespace-pre-wrap font-light italic">Running simulation...</div>
            </div>
        </div>
    </div>

    <script>
        async function runSimulation() {
            const idea = document.getElementById('ideaInput').value;
            const btn = document.getElementById('runBtn');
            const outputDiv = document.getElementById('output');
            const resultsArea = document.getElementById('resultsArea');

            if(!idea) return alert("Please enter an idea.");

            btn.innerText = "Simulating...";
            btn.disabled = true;
            resultsArea.classList.remove('hidden');
            outputDiv.innerText = "Executing Adversarial Logic...";

            try {
                const response = await fetch('/api/audit?idea=' + encodeURIComponent(idea));
                const data = await response.json();
                outputDiv.innerText = data.result;
            } catch (err) {
                outputDiv.innerText = "Error connecting to Orchestrator. Check Vercel Environment Variables.";
            } finally {
                btn.innerText = "Execute War-Game";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
